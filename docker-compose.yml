services:
  postgis:
    image: postgis/postgis:16-3.4
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-scantomap}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-scantomap}
      POSTGRES_DB: ${POSTGRES_DB:-scantomap}
    volumes:
      - postgis_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-scantomap} -d ${POSTGRES_DB:-scantomap}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  search-server:
    build:
      context: ./search-server
      dockerfile: Dockerfile
      args:
        # Override to match your host CUDA driver, e.g.:
        #   CUDA_VERSION=12.8.1 TORCH_CUDA_VERSION=cu128 docker compose up --build
        - CUDA_VERSION=${CUDA_VERSION:-13.0.1}
        - TORCH_CUDA_VERSION=${TORCH_CUDA_VERSION:-cu130}
    ports:
      - "5000:5000"
    volumes:
      # Live-mount the search-server source so code changes take effect without
      # rebuilding the image.  Restart the container (docker compose restart
      # search-server) to pick up changes; no --build required.
      - ./search-server:/app/search-server
      # data/ and outputs/ are mounted at the level expected by app.py
      # (Path(__file__).parent / ".." / "data"  →  /app/data)
      - ./data:/app/data:ro
      - ./outputs:/app/outputs
    depends_on:
      postgis:
        condition: service_healthy
    env_file:
      # Loads OPENAI_API_KEY (and any other vars) from the search-server .env file.
      # Values set in the 'environment' block below take precedence.
      - ./search-server/.env
    environment:
      # Set DATASET_NAME to pre-load CLIP at startup for a specific dataset.
      # Leave empty (the default) to disable CLIP and use only text-based providers.
      - DATASET_NAME=${DATASET_NAME:-}
      # PostGIS connection (defaults match the postgis service above)
      - POSTGRES_HOST=postgis
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-scantomap}
      - POSTGRES_USER=${POSTGRES_USER:-scantomap}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-scantomap}
    command: >
      sh -c "
        python3.11 /app/search-server/spatial-db/create_tables.py &&
        python3.11 app.py ${DATASET_NAME}
      "
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped

volumes:
  postgis_data:
